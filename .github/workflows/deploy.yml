name: Deploy Discord Bot

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy code
        run: |
          cd /root/Discord_mriamys
          git pull origin master
          source /root/shared_env/bin/activate
          pip install -r requirements.txt
          systemctl restart mriamys
